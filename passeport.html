<style>
:root {
  --bg: #07090f;
  --surface: #0f1320;
  --card: #151c2e;
  --card-hover: #1a2238;
  --border: #1e2d4a;
  --accent: #3b82f6;
  --accent2: #06b6d4;
  --grad: linear-gradient(135deg, #3b82f6, #06b6d4);
  --text: #e2e8f0;
  --muted: #64748b;
  --success: #22c55e;
  --warn: #f59e0b;
  --danger: #ef4444;
  --b1: #6366f1;
  --b2: #3b82f6;
  --b3: #06b6d4;
  --b4: #10b981;
  --b5: #f59e0b;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: var(--bg); color: var(--text); font-family: 'Inter', system-ui, sans-serif; min-height: 100vh; }

/* ── NAV ── */
nav { background: var(--surface); border-bottom: 1px solid var(--border); padding: 0 2rem; display: flex; align-items: center; justify-content: space-between; height: 60px; position: sticky; top: 0; z-index: 100; }
.nav-logo { display: flex; align-items: center; gap: .75rem; }
.nav-logo img { height: 28px; }
.nav-logo span { font-size: .75rem; font-weight: 600; color: var(--muted); letter-spacing: .05em; text-transform: uppercase; }
.nav-right { display: flex; align-items: center; gap: 1rem; }
.nav-user { font-size: .85rem; color: var(--muted); }
.btn { display: inline-flex; align-items: center; gap: .4rem; padding: .45rem 1rem; border-radius: 8px; border: none; cursor: pointer; font-size: .85rem; font-weight: 500; transition: all .15s; }
.btn-primary { background: var(--grad); color: #fff; }
.btn-primary:hover { opacity: .9; }
.btn-ghost { background: transparent; color: var(--muted); border: 1px solid var(--border); }
.btn-ghost:hover { background: var(--card); color: var(--text); }
.btn-sm { padding: .3rem .7rem; font-size: .78rem; }
.btn-danger { background: var(--danger); color: #fff; }
.btn-success { background: var(--success); color: #fff; }

/* ── PAGES ── */
.page { display: none; }
.page.active { display: block; }

/* ── LOGIN ── */
#page-login { min-height: 100vh; display: none; align-items: center; justify-content: center; background: var(--bg); }
#page-login.active { display: flex; }
.login-box { width: 100%; max-width: 420px; background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 2.5rem; }
.login-logo { text-align: center; margin-bottom: 2rem; }
.login-logo img { height: 36px; margin-bottom: .75rem; display: block; margin-left: auto; margin-right: auto; }
.login-logo h1 { font-size: 1.1rem; font-weight: 700; }
.login-logo p { font-size: .82rem; color: var(--muted); margin-top: .3rem; }
.form-group { margin-bottom: 1.2rem; }
label { display: block; font-size: .82rem; font-weight: 500; color: var(--muted); margin-bottom: .4rem; }
input, select, textarea { width: 100%; background: var(--card); border: 1px solid var(--border); border-radius: 8px; padding: .6rem .9rem; color: var(--text); font-size: .9rem; outline: none; transition: border-color .15s; }
input:focus, select:focus, textarea:focus { border-color: var(--accent); }
.login-box .btn { width: 100%; justify-content: center; padding: .75rem; font-size: .95rem; margin-top: .5rem; }
.login-tabs { display: flex; gap: .5rem; margin-bottom: 1.5rem; }
.tab-btn { flex: 1; padding: .5rem; background: var(--card); border: 1px solid var(--border); border-radius: 8px; color: var(--muted); cursor: pointer; font-size: .82rem; font-weight: 500; transition: all .15s; }
.tab-btn.active { background: var(--grad); color: #fff; border-color: transparent; }
.login-error { color: var(--danger); font-size: .82rem; text-align: center; margin-top: .75rem; min-height: 1.2rem; }

/* ── LAYOUT ── */
.layout { display: flex; }
.sidebar { width: 240px; min-height: calc(100vh - 60px); background: var(--surface); border-right: 1px solid var(--border); padding: 1.5rem 1rem; flex-shrink: 0; }
.main { flex: 1; padding: 2rem; max-width: calc(100vw - 240px); }
.sidebar-nav { list-style: none; }
.sidebar-nav li a { display: flex; align-items: center; gap: .6rem; padding: .55rem .75rem; border-radius: 8px; text-decoration: none; color: var(--muted); font-size: .87rem; font-weight: 500; transition: all .15s; margin-bottom: .2rem; }
.sidebar-nav li a:hover, .sidebar-nav li a.active { background: var(--card); color: var(--text); }
.sidebar-nav li a .icon { font-size: 1rem; }
.sidebar-section { font-size: .7rem; font-weight: 700; letter-spacing: .1em; text-transform: uppercase; color: var(--muted); padding: .5rem .75rem; margin-top: 1rem; margin-bottom: .3rem; }

/* ── HEADING ── */
.page-header { margin-bottom: 2rem; }
.page-header h2 { font-size: 1.5rem; font-weight: 700; }
.page-header p { color: var(--muted); font-size: .9rem; margin-top: .3rem; }

/* ── CARDS ── */
.card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 1.5rem; }
.stat-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 1rem; margin-bottom: 2rem; }
.stat-card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 1.2rem 1.5rem; }
.stat-card .label { font-size: .78rem; color: var(--muted); font-weight: 500; text-transform: uppercase; letter-spacing: .05em; }
.stat-card .value { font-size: 2rem; font-weight: 700; margin-top: .25rem; background: var(--grad); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
.stat-card .sub { font-size: .78rem; color: var(--muted); margin-top: .15rem; }

/* ── PROGRESS BAR ── */
.progress-bar { background: var(--border); border-radius: 99px; height: 6px; overflow: hidden; }
.progress-fill { height: 100%; border-radius: 99px; background: var(--grad); transition: width .4s ease; }

/* ── BLOCS ── */
.blocs-grid { display: flex; flex-direction: column; gap: 1.5rem; }
.bloc { background: var(--card); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; }
.bloc-header { padding: 1.25rem 1.5rem; display: flex; align-items: center; gap: 1rem; cursor: pointer; user-select: none; }
.bloc-header:hover { background: var(--card-hover); }
.bloc-num { width: 36px; height: 36px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: .85rem; color: #fff; flex-shrink: 0; }
.bloc-info { flex: 1; }
.bloc-title { font-weight: 600; font-size: .95rem; }
.bloc-count { font-size: .78rem; color: var(--muted); margin-top: .15rem; }
.bloc-progress { width: 120px; }
.bloc-pct { font-size: .78rem; color: var(--muted); text-align: right; margin-bottom: .3rem; }
.bloc-chevron { color: var(--muted); font-size: 1.1rem; transition: transform .2s; }
.bloc.open .bloc-chevron { transform: rotate(90deg); }
.competencies { display: none; padding: 0 1.5rem 1.5rem; border-top: 1px solid var(--border); }
.bloc.open .competencies { display: block; }
.competency-item { display: flex; align-items: flex-start; gap: .75rem; padding: .9rem 0; border-bottom: 1px solid var(--border); }
.competency-item:last-child { border-bottom: none; }
.comp-check { margin-top: .1rem; flex-shrink: 0; }
.comp-check input[type=checkbox] { width: 18px; height: 18px; accent-color: var(--accent); cursor: pointer; }
.comp-body { flex: 1; }
.comp-name { font-size: .9rem; font-weight: 500; }
.comp-name.checked { text-decoration: line-through; color: var(--muted); }
.comp-meta { display: flex; align-items: center; gap: .75rem; margin-top: .4rem; }
.level-stars { display: flex; gap: 2px; }
.star { cursor: pointer; font-size: 1rem; color: var(--border); transition: color .1s; }
.star.lit { color: var(--warn); }
.comp-comment-toggle { font-size: .75rem; color: var(--accent); cursor: pointer; text-decoration: underline; }
.comp-comment { margin-top: .5rem; }
.comp-comment textarea { font-size: .82rem; padding: .5rem .75rem; border-radius: 6px; min-height: 60px; resize: vertical; }
.comp-date { font-size: .72rem; color: var(--muted); margin-top: .3rem; }

/* ── TEACHER TABLE ── */
.students-table { width: 100%; border-collapse: collapse; }
.students-table th { text-align: left; font-size: .75rem; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: .05em; padding: .6rem 1rem; border-bottom: 1px solid var(--border); }
.students-table td { padding: .75rem 1rem; border-bottom: 1px solid var(--border); font-size: .87rem; }
.students-table tr:hover td { background: var(--card-hover); cursor: pointer; }
.badge { display: inline-block; padding: .2rem .55rem; border-radius: 99px; font-size: .72rem; font-weight: 600; }
.badge-blue { background: rgba(59,130,246,.15); color: #60a5fa; }
.badge-green { background: rgba(34,197,94,.15); color: #4ade80; }
.badge-amber { background: rgba(245,158,11,.15); color: #fcd34d; }
.badge-red { background: rgba(239,68,68,.15); color: #f87171; }

/* ── MODAL ── */
.overlay { position: fixed; inset: 0; background: rgba(0,0,0,.7); z-index: 200; display: none; align-items: center; justify-content: center; }
.overlay.open { display: flex; }
.modal { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 2rem; width: 90%; max-width: 600px; max-height: 85vh; overflow-y: auto; }
.modal h3 { font-size: 1.15rem; font-weight: 700; margin-bottom: 1.5rem; }
.modal-footer { display: flex; justify-content: flex-end; gap: .75rem; margin-top: 1.5rem; }

/* ── ADMIN ── */
.drop-zone { border: 2px dashed var(--border); border-radius: 12px; padding: 3rem 2rem; text-align: center; cursor: pointer; transition: all .2s; }
.drop-zone:hover, .drop-zone.drag-over { border-color: var(--accent); background: rgba(59,130,246,.05); }
.drop-zone .icon { font-size: 2.5rem; margin-bottom: 1rem; }
.drop-zone p { color: var(--muted); font-size: .9rem; }
.drop-zone span { color: var(--accent); font-weight: 500; }

/* ── TEACHER STUDENT DETAIL ── */
.back-btn { display: flex; align-items: center; gap: .4rem; color: var(--muted); font-size: .85rem; cursor: pointer; margin-bottom: 1.5rem; }
.back-btn:hover { color: var(--text); }
.mini-blocs { display: grid; grid-template-columns: repeat(5, 1fr); gap: .75rem; margin-bottom: 2rem; }
.mini-bloc { background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 1rem; text-align: center; }
.mini-bloc .num { font-size: .7rem; color: var(--muted); }
.mini-bloc .pct { font-size: 1.3rem; font-weight: 700; margin: .25rem 0; }
.mini-bloc .bar { }
.notes-section { margin-top: 1.5rem; }
.note-card { background: var(--card); border: 1px solid var(--border); border-radius: 8px; padding: .9rem 1rem; margin-bottom: .75rem; font-size: .87rem; }
.note-meta { font-size: .75rem; color: var(--muted); margin-top: .4rem; }
.toast { position: fixed; bottom: 1.5rem; right: 1.5rem; background: var(--success); color: #fff; padding: .75rem 1.25rem; border-radius: 8px; font-size: .87rem; font-weight: 500; z-index: 999; animation: slideIn .2s; }
@keyframes slideIn { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

/* ── EMPTY STATE ── */
.empty { text-align: center; padding: 4rem 2rem; color: var(--muted); }
.empty .icon { font-size: 2.5rem; margin-bottom: 1rem; }

@media (max-width: 768px) {
  .sidebar { display: none; }
  .main { max-width: 100vw; padding: 1rem; }
  .mini-blocs { grid-template-columns: repeat(2, 1fr); }
}
</style>

// ══════════════ STATE ══════════════
let currentUser = null;

// ══════════════ AUTH ══════════════
async function init() {
  const { data: { session } } = await supabase.auth.getSession();
  if (session) await onLogin(session.user);
  supabase.auth.onAuthStateChange(async (event, session) => {
    if (session) await onLogin(session.user);
    else showLogin();
  });
}

async function onLogin(user) {
  currentUser = user;
  const { data: profile } = await supabase.from('profiles').select('*').eq('id', user.id).single();
  currentProfile = profile;
  if (!profile) { showError('Profil introuvable. Contactez un administrateur.'); return; }
  document.getElementById('nav-user-name').textContent = `${profile.first_name} ${profile.last_name} · ${profile.role === 'student' ? '🎓' : profile.role === 'teacher' ? '👨‍🏫' : '⚙️'}`;
  buildSidebar(profile.role);
  document.getElementById('page-login').classList.remove('active');
  document.getElementById('app-shell').style.display = 'block';
  if (profile.role === 'student') { await loadProgress(); renderStudent(); }
  else if (profile.role === 'teacher') renderTeacherHome();
  else renderAdmin();
}

async function doLogin() {
  const email = document.getElementById('login-email').value.trim();
  const password = document.getElementById('login-password').value;
  document.getElementById('login-error').textContent = '';
  const { error } = await supabase.auth.signInWithPassword({ email, password });
  if (error) document.getElementById('login-error').textContent = error.message;
}

async function doMagicLink() {
  const email = document.getElementById('magic-email').value.trim();
  const { error } = await supabase.auth.signInWithOtp({ email });
  if (error) document.getElementById('login-error').textContent = error.message;
  else document.getElementById('login-error').textContent = '✅ Lien envoyé — vérifie ta boîte mail.';
}

async function doLogout() {
  await supabase.auth.signOut();
  location.reload();
}

function showLogin() {
  document.getElementById('page-login').classList.add('active');
  document.getElementById('app-shell').style.display = 'none';
}
function showError(msg) { document.getElementById('login-error').textContent = msg; }
function setLoginTab(t) {
  document.querySelectorAll('.tab-btn').forEach((b,i) => b.classList.toggle('active', (i===0&&t==='email')||(i===1&&t==='magic')));
  document.getElementById('login-email-form').style.display = t==='email'?'':'none';
  document.getElementById('login-magic-form').style.display = t==='magic'?'':'none';
}

    { icon: '🏠', label: 'Tableau de bord', view: 'teacher-home' },
    { icon: '👥', label: 'Mes apprenants', view: 'teacher-students' },
  ] : [
    { icon: '🏠', label: 'Tableau de bord', view: 'admin-home' },
    { icon: '👥', label: 'Utilisateurs', view: 'admin-users' },
    { icon: '📥', label: 'Import CSV / Excel', view: 'admin-import' },
  ];
  nav.innerHTML = items.map(i => `<li><a href="#" onclick="navigate('${i.view}');return false;"><span class="icon">${i.icon}</span>${i.label}</a></li>`).join('');
}

function navigate(view) {
  document.querySelectorAll('.sidebar-nav a').forEach(a => a.classList.toggle('active', a.getAttribute('onclick').includes(view)));
  currentView = view;
  if (view === 'passport') renderStudent();
  else if (view === 'progress') renderProgress();
  else if (view === 'teacher-home') renderTeacherHome();
  else if (view === 'teacher-students') renderTeacherStudents();
  else if (view === 'admin-home') renderAdmin();
  else if (view === 'admin-users') renderAdminUsers();
  else if (view === 'admin-import') renderAdminImport();
}

async function loadProgress() {

// ══════════════ STUDENT — PASSPORT ══════════════
function renderStudent() {
  const checked = Object.values(progressMap).filter(p => p.checked).length;
  const pct = Math.round(checked / TOTAL_COMP * 100);
  document.getElementById('main-content').innerHTML = `
    <div class="page-header">
      <h2>Mon Passeport de Compétences</h2>
      <p>MSDMC · RNCP 41475 · ${currentProfile.campus||''} ${currentProfile.promo||''}</p>
    </div>
    <div class="stat-grid">
      <div class="stat-card"><div class="label">Compétences validées</div><div class="value">${checked}/${TOTAL_COMP}</div><div class="sub">sur ${TOTAL_COMP} compétences</div></div>
      <div class="stat-card"><div class="label">Progression globale</div><div class="value">${pct}%</div><div class="sub">${pct < 50 ? 'En cours…' : pct < 100 ? 'Bonne dynamique !' : '🎉 Complet !'}</div></div>
      <div class="stat-card"><div class="label">Blocs complétés</div><div class="value">${BLOCS.filter(b => b.competencies.every(c => progressMap[c.id]?.checked)).length}/5</div><div class="sub">blocs RNCP</div></div>
    </div>
    <div class="card" style="margin-bottom:1.5rem;padding:1rem 1.5rem;">
      <div style="display:flex;justify-content:space-between;margin-bottom:.5rem;font-size:.82rem;color:var(--muted)"><span>Progression globale</span><span>${pct}%</span></div>
      <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
    </div>
    <div class="blocs-grid" id="blocs-container">
      ${BLOCS.map(b => renderBloc(b)).join('')}
    </div>`;
}

function renderBloc(bloc) {
  const total = bloc.competencies.length;
  const done = bloc.competencies.filter(c => progressMap[c.id]?.checked).length;
  const pct = Math.round(done / total * 100);
  return `
  <div class="bloc" id="bloc-${bloc.id}">
    <div class="bloc-header" onclick="toggleBloc('${bloc.id}')">
      <div class="bloc-num" style="background:${bloc.color}">${bloc.num}</div>
      <div class="bloc-info">
        <div class="bloc-title">${bloc.title}</div>
        <div class="bloc-count">${done}/${total} compétences</div>
      </div>
      <div class="bloc-progress">
        <div class="bloc-pct">${pct}%</div>
        <div class="progress-bar"><div class="progress-fill" style="width:${pct}%;background:${bloc.color}"></div></div>
      </div>
      <span class="bloc-chevron">›</span>
    </div>
    <div class="competencies">
      ${bloc.competencies.map(c => renderCompetency(c)).join('')}
    </div>
  </div>`;
}

function renderCompetency(comp) {
  const p = progressMap[comp.id] || {};
  const checked = !!p.checked;
  const level = p.level || 0;
  const comment = p.comment || '';
  const date = p.updated_at ? new Date(p.updated_at).toLocaleDateString('fr-FR') : '';
  const stars = [1,2,3].map(s => `<span class="star ${s<=level?'lit':''}" onclick="setLevel('${comp.id}',${s})">★</span>`).join('');
  return `
  <div class="competency-item" id="comp-${comp.id}">
    <div class="comp-check"><input type="checkbox" ${checked?'checked':''} onchange="toggleComp('${comp.id}',this.checked)"></div>
    <div class="comp-body">
      <div class="comp-name ${checked?'checked':''}">${comp.name}</div>
      <div class="comp-meta">
        <div class="level-stars">${stars}</div>
        <span class="comp-comment-toggle" onclick="toggleComment('${comp.id}')">${comment?'✏️ Modifier':'+ Commentaire'}</span>
        ${date?`<span class="comp-date">${date}</span>`:''}
      </div>
      <div class="comp-comment" id="comment-${comp.id}" style="display:${comment?'block':'none'}">
        <textarea placeholder="Tes notes, exemples, liens de preuves…" onblur="saveComment('${comp.id}',this.value)">${comment}</textarea>
      </div>
    </div>
  </div>`;
}

function toggleBloc(id) {
  document.getElementById('bloc-'+id).classList.toggle('open');
}

async function toggleComp(compId, checked) {
  const existing = progressMap[compId];
  const data = { user_id: currentUser.id, competency_id: compId, checked, updated_at: new Date().toISOString() };
  if (existing) {
    await supabase.from('competency_progress').update({ checked, updated_at: new Date().toISOString() }).eq('user_id', currentUser.id).eq('competency_id', compId);
    progressMap[compId] = { ...existing, checked };
  } else {
    const { data: row } = await supabase.from('competency_progress').insert(data).select().single();
    if (row) progressMap[compId] = row;
  }
  // Update UI without full re-render
  const nameEl = document.querySelector(`#comp-${compId} .comp-name`);
  if (nameEl) nameEl.classList.toggle('checked', checked);
  updateBlocPct(compId);
  toast(checked ? '✅ Compétence validée !' : 'Compétence décochée');
}

async function setLevel(compId, level) {
  const existing = progressMap[compId];
  const newLevel = existing?.level === level ? 0 : level;
  if (existing) {
    await supabase.from('competency_progress').update({ level: newLevel }).eq('user_id', currentUser.id).eq('competency_id', compId);
    progressMap[compId] = { ...existing, level: newLevel };
  } else {
    const { data: row } = await supabase.from('competency_progress').insert({ user_id: currentUser.id, competency_id: compId, checked: false, level: newLevel }).select().single();
    if (row) progressMap[compId] = row;
  }
  // Re-render stars
  const stars = document.querySelectorAll(`#comp-${compId} .star`);
  stars.forEach((s,i) => s.classList.toggle('lit', i < newLevel));
}

function toggleComment(compId) {
  const el = document.getElementById('comment-'+compId);
  el.style.display = el.style.display === 'none' ? 'block' : 'none';
  if (el.style.display === 'block') el.querySelector('textarea').focus();
}

async function saveComment(compId, value) {
  const existing = progressMap[compId];
  if (existing) {
    await supabase.from('competency_progress').update({ comment: value }).eq('user_id', currentUser.id).eq('competency_id', compId);
    progressMap[compId] = { ...existing, comment: value };
  } else {
    const { data: row } = await supabase.from('competency_progress').insert({ user_id: currentUser.id, competency_id: compId, comment: value, checked: false }).select().single();
    if (row) progressMap[compId] = row;
  }
  const toggle = document.querySelector(`#comp-${compId} .comp-comment-toggle`);
  if (toggle) toggle.textContent = value ? '✏️ Modifier' : '+ Commentaire';
}

function updateBlocPct(compId) {
  const bloc = BLOCS.find(b => b.competencies.some(c => c.id === compId));
  if (!bloc) return;
  const done = bloc.competencies.filter(c => progressMap[c.id]?.checked).length;
  const pct = Math.round(done / bloc.competencies.length * 100);
  const el = document.querySelector(`#bloc-${bloc.id} .bloc-count`);
  if (el) el.textContent = `${done}/${bloc.competencies.length} compétences`;
  const pctEl = document.querySelector(`#bloc-${bloc.id} .bloc-pct`);
  if (pctEl) pctEl.textContent = pct + '%';
  const fill = document.querySelector(`#bloc-${bloc.id} .progress-fill`);
  if (fill) fill.style.width = pct + '%';
}

function renderProgress() {
  const rows = BLOCS.map(b => {

  document.getElementById('main-content').innerHTML = `

async function viewStudent(studentId, studentName) {
  selectedStudentId = studentId;
  const { data: prog } = await supabase.from('competency_progress').select('*').eq('user_id', studentId);
  const { data: notes } = await supabase.from('teacher_notes').select('*').eq('student_id', studentId).order('created_at', { ascending: false });
  const pMap = {};
  (prog||[]).forEach(p => pMap[p.competency_id] = p);

  const miniBlocs = BLOCS.map(b => {
    const done = b.competencies.filter(c => pMap[c.id]?.checked).length;
    const pct = Math.round(done/b.competencies.length*100);
    return `<div class="mini-bloc">
      <div class="num">Bloc ${b.num}</div>
      <div class="pct" style="color:${b.color}">${pct}%</div>
      <div class="bar progress-bar"><div class="progress-fill" style="width:${pct}%;background:${b.color}"></div></div>
    </div>`;
  }).join('');

  const blocsDetail = BLOCS.map(b => {
    const done = b.competencies.filter(c => pMap[c.id]?.checked).length;
    const rows = b.competencies.map(c => {
      const p = pMap[c.id]||{};
      const stars = [1,2,3].map(s => `<span style="color:${s<=(p.level||0)?'var(--warn)':'var(--border)'}">★</span>`).join('');
      return `<tr>
        <td style="padding:.5rem .75rem">${p.checked?'<span style="color:var(--success)">✅</span>':'<span style="color:var(--muted)">○</span>'}</td>
        <td style="padding:.5rem .75rem;font-size:.85rem">${c.name}</td>
        <td style="padding:.5rem .75rem">${stars}</td>
        <td style="padding:.5rem .75rem;font-size:.78rem;color:var(--muted);max-width:200px">${p.comment||''}</td>
      </tr>`;
    }).join('');
    return `<div class="bloc" style="margin-bottom:1rem">
      <div class="bloc-header" onclick="this.parentElement.classList.toggle('open')" style="cursor:pointer">
        <div class="bloc-num" style="background:${b.color}">${b.num}</div>
        <div class="bloc-info"><div class="bloc-title">${b.title}</div><div class="bloc-count">${done}/${b.competencies.length}</div></div>
        <span class="bloc-chevron">›</span>
      </div>
      <div class="competencies">
        <table style="width:100%;border-collapse:collapse"><thead><tr style="font-size:.72rem;color:var(--muted)"><th style="padding:.4rem .75rem;text-align:left">Statut</th><th style="padding:.4rem .75rem;text-align:left">Compétence</th><th>Niveau</th><th>Commentaire</th></tr></thead><tbody>${rows}</tbody></table>
      </div>
    </div>`;
  }).join('');

  const notesHTML = notes?.length ? notes.map(n => `<div class="note-card">${n.note}<div class="note-meta">${new Date(n.created_at).toLocaleString('fr-FR')}</div></div>`).join('') : '<p style="color:var(--muted);font-size:.85rem">Aucune note pour cet apprenant.</p>';

  document.getElementById('main-content').innerHTML = `
    <div class="back-btn" onclick="navigate('teacher-students')">← Retour aux apprenants</div>
    <div class="page-header">
      <h2>📋 ${studentName}</h2>
      <p>${currentProfile.campus||''} · ${currentProfile.promo||''}</p>
    </div>
    <div class="mini-blocs">${miniBlocs}</div>
    <div class="card" style="margin-bottom:1.5rem">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1.25rem">
        <h3 style="font-size:1rem">Détail des compétences</h3>
        <button class="btn btn-primary btn-sm" onclick="openNoteModal('${studentId}')">📝 Ajouter une note</button>
      </div>
      <div class="blocs-grid">${blocsDetail}</div>
    </div>
    <div class="card notes-section">
      <h3 style="font-size:1rem;margin-bottom:1rem">📒 Notes formateur</h3>
      ${notesHTML}
    </div>`;
}

function openNoteModal(studentId) {
  noteTargetStudentId = studentId;
  document.getElementById('note-text').value = '';
  document.getElementById('modal-note').classList.add('open');
}

async function saveNote() {
  const text = document.getElementById('note-text').value.trim();
  if (!text) return;
  await supabase.from('teacher_notes').insert({ teacher_id: currentUser.id, student_id: noteTargetStudentId, note: text });
  closeModal('modal-note');
  toast('📝 Note enregistrée');
  if (selectedStudentId === noteTargetStudentId) viewStudent(selectedStudentId, '');
}

function handleDrop(e) {
  e.preventDefault();
  document.getElementById('drop-zone').classList.remove('drag-over');
  const file = e.dataTransfer.files[0];
  if (file) handleFile(file);
}

function handleFile(file) {
  if (!file) return;
  Papa.parse(file, {
    header: true, skipEmptyLines: true,
    complete: ({ data }) => showImportPreview(data)
  });
}

function showImportPreview(rows) {
  const mapped = rows.map(r => ({
    email: (r.email||r.Email||r['e-mail']||'').trim(),
    first_name: (r.prenom||r.prénom||r.Prenom||r.Prénom||r.first_name||'').trim(),
    last_name: (r.nom||r.Nom||r.last_name||'').trim(),
    campus: (r.campus||r.Campus||'').trim(),
    promo: (r.promo||r.Promo||'').trim(),
    role: (r.role||r.Role||'student').trim().toLowerCase(),
  })).filter(r => r.email);

  document.getElementById('import-preview').innerHTML = `
    <div class="card">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1rem">
        <h3 style="font-size:1rem">${mapped.length} comptes à créer</h3>
        <button class="btn btn-primary" onclick="doImport(${JSON.stringify(mapped).replace(/"/g,'&quot;')})">Importer →</button>
      </div>
      <table class="students-table">
        <thead><tr><th>Email</th><th>Prénom</th><th>Nom</th><th>Campus</th><th>Promo</th><th>Rôle</th></tr></thead>
        <tbody>${mapped.slice(0,20).map(r => `<tr><td>${r.email}</td><td>${r.first_name}</td><td>${r.last_name}</td><td>${r.campus}</td><td>${r.promo}</td><td><span class="badge ${r.role==='student'?'badge-blue':'badge-green'}">${r.role}</span></td></tr>`).join('')}</tbody>
      </table>
      ${mapped.length>20?`<p style="text-align:center;color:var(--muted);font-size:.82rem;margin-top:.75rem">… et ${mapped.length-20} autres</p>`:''}
    </div>`;
  window._importData = mapped;
}

async function doImport(data) {
  const rows = data || window._importData;
  if (!rows?.length) return;
  let ok = 0, fail = 0;
  for (const row of rows) {
    const tmpPwd = Math.random().toString(36).slice(2,10) + 'A1!';
    const { error } = await supabase.auth.admin?.createUser?.({
      email: row.email,
      password: tmpPwd,
      user_metadata: { first_name: row.first_name, last_name: row.last_name, role: row.role, campus: row.campus, promo: row.promo },
      email_confirm: true
    }) || await supabase.auth.signUp({
      email: row.email, password: tmpPwd,
      options: { data: { first_name: row.first_name, last_name: row.last_name, role: row.role, campus: row.campus, promo: row.promo } }
    });
    if (error) fail++; else ok++;
  }
  toast(`✅ ${ok} comptes créés${fail?` · ⚠️ ${fail} erreurs`:''}`);
}

// ══════════════ UTILS ══════════════
function closeModal(id) { document.getElementById(id).classList.remove('open'); }

function toast(msg) {
  const el = document.createElement('div');
  el.className = 'toast';
  el.textContent = msg;
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 3000);
}

// ══════════════ BOOT ══════════════
init();

  // Expose all functions to global scope (required for onclick attributes)
  Object.assign(window, {
             doLogin, doMagicLink, doLogout, setLoginTab,
      navigate, toggleBloc, toggleComp, setLevel, toggleComment, saveComment,
      openNoteModal, saveNote, closeModal, viewStudent,
      handleDrop, handleFile, doImport,
      renderAdmin, renderAdminUsers, renderAdminImport,
      renderTeacherHome, renderTeacherStudents, renderStudent, renderProgress
  });
</script>
